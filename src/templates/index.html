<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Local — Route Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- NAV -->
<div class="nav">
    <div class="nav-icon">🚆</div>
    <div>
        <span class="nav-title">Mumbai Local</span>
        <span class="nav-sub">Route Planner + Delay Predictor</span>
    </div>
</div>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-inner">

            <!-- STATION SEARCH -->
            <div class="search-box">
                <div class="search-row">
                    <div class="search-icon">🔵</div>
                    <div class="search-wrap">
                        <input class="search-input" type="text" id="srcInput" placeholder="From station" autocomplete="off">
                        <div class="dropdown" id="srcDropdown"></div>
                    </div>
                </div>
                <div class="divider"></div>
                <div class="search-row">
                    <div class="search-icon">🔴</div>
                    <div class="search-wrap">
                        <input class="search-input" type="text" id="dstInput" placeholder="To station" autocomplete="off">
                        <div class="dropdown" id="dstDropdown"></div>
                    </div>
                </div>
            </div>

            <!-- TIME -->
            <div class="time-section">
                <div class="section-label">Time of Travel</div>
                <div class="chips">
                    <span class="chip" onclick="setHour(8, this)">Morning Peak</span>
                    <span class="chip" onclick="setHour(13, this)">Afternoon</span>
                    <span class="chip" onclick="setHour(18, this)">Evening Peak</span>
                    <span class="chip" onclick="setHour(22, this)">Night</span>
                </div>
                <div class="hour-row">
                    <label>Custom hour:</label>
                    <input type="number" id="hourInput" min="0" max="23" value="8">
                </div>
            </div>

            <!-- BUTTON -->
            <button class="btn" id="planBtn" onclick="planRoute()">
                🗺️ Get Route & Delay Forecast
            </button>

            <!-- LOADING -->
            <div class="loading" id="loading">Finding route and predicting delays...</div>

            <!-- RESULT -->
            <div class="result" id="result">
                <div class="result-summary">
                    <div class="result-title" id="routeTitle"></div>
                    <div class="stats">
                        <div>
                            <div class="stat-val" id="statStops">-</div>
                            <div class="stat-lbl">Stops</div>
                        </div>
                        <div>
                            <div class="stat-val" id="statTime">-</div>
                            <div class="stat-lbl">Travel Time</div>
                        </div>
                        <div>
                            <div class="stat-val" id="statDelay">-</div>
                            <div class="stat-lbl">Max Delay</div>
                        </div>
                    </div>
                </div>
                <div class="stops-label">Route Stops</div>
                <div id="stopsContainer"></div>
            </div>

        </div>
    </div>

    <!-- MAP -->
    <div style="flex:1; position:relative; height:calc(100vh - 56px);">
        <div id="map"></div>
        <div class="legend">
            <div class="legend-title">Lines</div>
            <div class="legend-item"><div class="legend-line" style="background:#1a73e8"></div> Western</div>
            <div class="legend-item"><div class="legend-line" style="background:#ea4335"></div> Central</div>
            <div class="legend-item"><div class="legend-line" style="background:#34a853"></div> Harbour</div>
            <div class="legend-item"><div class="legend-line" style="background:#ff6d00; height:5px;"></div> Your Route</div>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="/static/script.js"></script>
</body>
</html>
