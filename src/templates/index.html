<!DOCTYPE html>

        }

        .hour-section { margin-bottom: 16px; }
        .hour-label {
            font-size: 0.75rem; font-weight: 500; color: #5f6368;
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
        }
        .hour-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .chip {

            border-radius: 100px; font-size: 0.8rem; color: #5f6368;
            cursor: pointer; transition: all 0.15s; font-family: 'Roboto', sans-serif;

        .hour-input-row { display: flex; align-items: center; gap: 10px; }
        .hour-input-row label { font-size: 0.82rem; color: #5f6368; white-space: nowrap; }
        input[type="number"] {
            width: 80px; background: white; border: 1px solid #dadce0;
            border-radius: 8px; color: #202124; font-family: 'Roboto', sans-serif;
            font-size: 0.9rem; padding: 8px 12px;

        .submit-btn {

// ──────────────────────────────────────────────
// BFS PATHFINDING
// ──────────────────────────────────────────────
function findPath(from, to) {
    if (!GRAPH[from] || !GRAPH[to]) return null;
    const visited = new Set([from]);
    const queue = [[from]];
    while (queue.length) {
        const path = queue.shift();
        const node = path[path.length - 1];
        if (node === to) return path;
        for (const nb of (GRAPH[node] || [])) {
            if (!visited.has(nb)) {
                visited.add(nb);
                queue.push([...path, nb]);
            }
        }
    }
    return null;
}

function getDelay(hour, stationName) {
    const base = (Math.sin(stationName.charCodeAt(0)) * 3 + 5);
    const peak = (hour >= 7 && hour <= 10) || (hour >= 17 && hour <= 20) ? 4 : 0;
    return +(base + peak + Math.random() * 2).toFixed(1);
}

const lineOrder = {
    Western: ["Churchgate","Marine Lines","Charni Road","Grant Road","Mumbai Central","Mahalaxmi","Lower Parel","Elphinstone Road","Dadar","Matunga Road","Mahim","Bandra","Khar Road","Santacruz","Vile Parle","Andheri","Jogeshwari","Goregaon","Malad","Kandivali","Borivali","Dahisar","Mira Road","Bhayandar","Naigaon","Vasai Road","Nallasopara","Virar"],
    Central: ["CSMT","Masjid","Sandhurst Road","Byculla","Chinchpokli","Currey Road","Parel","Dadar Central","Matunga","Sion","Kurla","Vidyavihar","Ghatkopar","Vikhroli","Kanjur Marg","Bhandup","Nahur","Mulund","Thane","Kalwa","Mumbra","Diva","Kopar","Dombivli","Thakurli","Kalyan"],
    Harbour: ["CST Harbour","Dockyard Road","Reay Road","Cotton Green","Sewri","Wadala Road","GTB Nagar","Chunabhatti","Kurla Harbour","Tilak Nagar","Chembur","Govandi","Mankhurd","Vashi","Sanpada","Juinagar","Nerul","Seawoods","Belapur","Kharghar","Mansarovar","Khandeshwar","Panvel"]
};

for (const [lineName, stops] of Object.entries(lineOrder)) {
    const coords = stops.map(s => STATIONS[s] ? [STATIONS[s].lat, STATIONS[s].lng] : null).filter(Boolean);
    L.polyline(coords, { color: lineColors[lineName], weight: 3, opacity: 0.5 }).addTo(map);
}

// Small dots for all stations
for (const [name, info] of Object.entries(STATIONS)) {
    L.circleMarker([info.lat, info.lng], {
        radius: 4, color: lineColors[info.line], fillColor: 'white',
        fillOpacity: 1, weight: 2
    }).bindTooltip(name, { permanent: false, direction: 'top', className: 'station-tooltip' }).addTo(map);
}

// Route layer
let routeLayer = null;
let routeMarkers = [];

function drawRoute(path) {
    // Clear previous
    if (routeLayer) map.removeLayer(routeLayer);
    routeMarkers.forEach(m => map.removeLayer(m));
    routeMarkers = [];

    const coords = path.map(s => STATIONS[s] ? [STATIONS[s].lat, STATIONS[s].lng] : null).filter(Boolean);
    if (coords.length < 2) return;

    routeLayer = L.polyline(coords, {
        color: '#ff6d00', weight: 6, opacity: 0.9,
        dashArray: null, lineCap: 'round', lineJoin: 'round'
    }).addTo(map);

    path.forEach((s, i) => {
        if (!STATIONS[s]) return;
        const isFirst = i === 0, isLast = i === path.length - 1;
        const color = isFirst ? '#1a73e8' : isLast ? '#ea4335' : '#ff6d00';
        const radius = (isFirst || isLast) ? 9 : 6;
        const m = L.circleMarker([STATIONS[s].lat, STATIONS[s].lng], {
            radius, color, fillColor: 'white', fillOpacity: 1, weight: 3
        }).bindPopup(`<b>${s}</b><br>${STATIONS[s].line} Line`).addTo(map);
        routeMarkers.push(m);
    });

    map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });
}

// ──────────────────────────────────────────────
// SEARCH DROPDOWNS
// ──────────────────────────────────────────────
function buildDropdown(inputId, dropdownId, onSelect) {
    const input = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);

    function render(query) {
        dropdown.innerHTML = '';
        const matches = ALL_STATION_NAMES.filter(s => s.toLowerCase().includes(query.toLowerCase())).slice(0, 30);
        matches.forEach(s => {
            const div = document.createElement('div');
            div.className = 'dropdown-item';
            div.textContent = s;
            div.addEventListener('mousedown', e => {
                e.preventDefault();
                input.value = s;
                dropdown.classList.remove('open');
                onSelect(s);
            });
            dropdown.appendChild(div);
        });
        dropdown.classList.toggle('open', matches.length > 0);
    }

    input.addEventListener('focus', () => render(input.value));
    input.addEventListener('input', () => render(input.value));
    document.addEventListener('click', e => {
        if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('open');
    });
}

let selectedSrc = '', selectedDst = '';
buildDropdown('srcInput', 'srcDropdown', v => { selectedSrc = v; });
buildDropdown('dstInput', 'dstDropdown', v => { selectedDst = v; });

// ──────────────────────────────────────────────
// PLAN ROUTE
// ──────────────────────────────────────────────
function planRoute() {
    const src = selectedSrc || document.getElementById('srcInput').value.trim();
    const dst = selectedDst || document.getElementById('dstInput').value.trim();
    const hour = parseInt(document.getElementById('hourInput').value) || 8;

    if (!STATIONS[src]) { alert('Please select a valid source station from the list.'); return; }
    if (!STATIONS[dst]) { alert('Please select a valid destination station from the list.'); return; }
    if (src === dst) { alert('Source and destination cannot be the same.'); return; }

    const path = findPath(src, dst);
    if (!path) { alert('No route found between these stations.'); return; }

    // Build result
    const stops = path.map(s => ({
        station: s,
        line: STATIONS[s]?.line || 'Unknown',
        delay: getDelay(hour, s)
    }));
    const maxDelay = Math.max(...stops.map(s => s.delay));
    const totalTime = (path.length - 1) * 3; // ~3 min per stop

    drawRoute(path);
    renderResult(stops, totalTime, maxDelay);
}

function renderResult(stops, totalTime, maxDelay) {
    const panel = document.getElementById('resultPanel');
    panel.style.display = 'block';

    const stopsHtml = stops.map((s, i) => {
        const isFirst = i === 0, isLast = i === stops.length - 1;
        const dotStyle = isFirst ? 'border-color:#1a73e8;background:#1a73e8' : isLast ? 'border-color:#ea4335;background:#ea4335' : '';
        const lineClass = s.line === 'Western' ? 'western-pill' : s.line === 'Central' ? 'central-pill' : 'harbour-pill';
        const delayClass = s.delay <= 3 ? 'd-low' : s.delay <= 7 ? 'd-mid' : 'd-high';
        return `
        <div class="stop">
            <div class="stop-left"><div class="stop-dot" style="${dotStyle}"></div></div>
            <div class="stop-info">
                <div class="stop-name">${s.station}</div>
                <div class="stop-line"><span class="line-pill ${lineClass}">${s.line}</span></div>
            </div>
            <div class="delay-badge ${delayClass}">+${s.delay} min</div>
        </div>`;
    }).join('');

    panel.innerHTML = `
        <div class="result-summary">
            <div class="result-route-title">${stops[0].station} → ${stops[stops.length-1].station}</div>
            <div class="summary-stats">
                <div class="s-stat"><div class="s-val">${stops.length}</div><div class="s-lbl">Stops</div></div>
                <div class="s-stat"><div class="s-val">${totalTime} min</div><div class="s-lbl">Travel Time</div></div>
                <div class="s-stat"><div class="s-val">${maxDelay} min</div><div class="s-lbl">Max Delay</div></div>
            </div>
        </div>
        <div class="stops-title">Route Stops</div>
        ${stopsHtml}
    `;
}

function setHour(h, el) {
    document.getElementById('hourInput').value = h;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    if (el) el.classList.add('active');
}
</script>
